<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Employee Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #0d0f14;
  --ink2:    #1a1d27;
  --ink3:    #252938;
  --border:  #2e3347;
  --muted:   #6b7280;
  --text:    #e2e5f0;
  --text2:   #9aa0b4;
  --accent:  #5b8df6;
  --accent2: #8b6cf7;
  --green:   #34d399;
  --red:     #f87171;
  --amber:   #fbbf24;
  --r:       12px;
  --r2:      8px;
}

html { background: var(--ink); }

body {
  font-family: 'Syne', sans-serif;
  background: var(--ink);
  color: var(--text);
  min-height: 100svh;
  overflow-x: hidden;
}

/* ── Animations ─────────────────────────────────────────────────────── */
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse    { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)} }
@keyframes shimmer  { 0%{background-position:200% 0}100%{background-position:-200% 0} }
@keyframes slidein  { from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)} }
@keyframes pop      { 0%{transform:scale(.92)}60%{transform:scale(1.04)}100%{transform:scale(1)} }

/* ── Boot screen ─────────────────────────────────────────────────────── */
#boot {
  position: fixed; inset: 0; background: var(--ink);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px;
  z-index: 9999; transition: opacity .4s;
}
#boot.hidden { opacity: 0; pointer-events: none; }
.boot-logo {
  font-size: 13px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text2);
}
.boot-ring {
  width: 48px; height: 48px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%; animation: spin .9s linear infinite;
}
.boot-msg { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* ── Top bar ─────────────────────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,15,20,.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.tb-left  { display: flex; align-items: center; gap: 10px; }
.tb-title { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
.tb-dot   { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
#sync-badge {
  font-family: 'DM Mono', monospace; font-size: 11px;
  padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border);
  color: var(--muted); display: flex; align-items: center; gap: 5px;
  transition: all .3s;
}
#sync-badge.ok     { color: var(--green); border-color: rgba(52,211,153,.35); }
#sync-badge.busy   { color: var(--amber); border-color: rgba(251,191,36,.35); }
#sync-badge.err    { color: var(--red);   border-color: rgba(248,113,113,.35); }
.badge-spin { width: 10px; height: 10px; border: 1.5px solid rgba(251,191,36,.3); border-top-color: var(--amber); border-radius: 50%; animation: spin .7s linear infinite; }

/* ── Progress bar ────────────────────────────────────────────────────── */
#prog {
  position: fixed; top: 0; left: 0; height: 2px; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  z-index: 9998; transition: width .4s ease; border-radius: 0 2px 2px 0;
}
#prog.go   { width: 75%; }
#prog.done { width: 100%; transition: width .12s; }

/* ── Views ───────────────────────────────────────────────────────────── */
#app { display: none; min-height: calc(100svh - 56px); }
#app.show { display: block; }

.view { display: none; animation: fadeUp .25s ease; }
.view.active { display: block; }

/* ── Search bar ──────────────────────────────────────────────────────── */
.search-section {
  padding: 16px 20px 0;
  position: sticky; top: 56px; z-index: 100;
  background: var(--ink);
}
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; background: var(--ink2); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--text); font-family: 'Syne', sans-serif;
  font-size: 14px; padding: 11px 16px 11px 42px; outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: .4; pointer-events: none; }
.search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: var(--border); border: none; border-radius: 50%;
  width: 18px; height: 18px; cursor: pointer; display: none;
  align-items: center; justify-content: center; color: var(--text2); font-size: 11px;
}
.search-clear.show { display: flex; }

/* ── Stats strip ─────────────────────────────────────────────────────── */
.stats-strip {
  display: flex; gap: 8px; padding: 12px 20px 0; overflow-x: auto;
  scrollbar-width: none;
}
.stats-strip::-webkit-scrollbar { display: none; }
.stat-pill {
  background: var(--ink2); border: 1px solid var(--border);
  border-radius: 99px; padding: 5px 12px; white-space: nowrap;
  font-size: 12px; color: var(--text2); flex-shrink: 0;
}
.stat-pill span { color: var(--text); font-weight: 600; margin-left: 4px; }

/* ── Employee list ───────────────────────────────────────────────────── */
.emp-list { padding: 12px 20px 100px; display: flex; flex-direction: column; gap: 8px; }

.emp-card {
  background: var(--ink2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  animation: slidein .2s ease; transition: border-color .15s;
  cursor: pointer;
}
.emp-card:active { border-color: var(--accent); }

.emp-avatar {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; letter-spacing: -.5px;
}
.emp-info { flex: 1; min-width: 0; }
.emp-name  { font-size: 14px; font-weight: 600; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emp-email { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.emp-id    { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
.emp-chev  { color: var(--muted); flex-shrink: 0; }

/* ── Shimmer ─────────────────────────────────────────────────────────── */
.shim-card { background: var(--ink2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
.shim { border-radius: 6px; background: linear-gradient(90deg,var(--ink3) 25%,var(--border) 50%,var(--ink3) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
.shim-circle { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; }

/* ── Empty state ─────────────────────────────────────────────────────── */
.empty { text-align: center; padding: 60px 30px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
.empty strong { display: block; font-size: 16px; color: var(--text2); margin-bottom: 6px; }

/* ── FAB ─────────────────────────────────────────────────────────────── */
#fab {
  position: fixed; bottom: 24px; right: 20px;
  width: 54px; height: 54px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(91,141,246,.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s; z-index: 300;
}
#fab:active { transform: scale(.93); }
#fab svg { width: 22px; height: 22px; }

/* ── Bottom sheet (detail / form) ───────────────────────────────────── */
#sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 400; display: none; backdrop-filter: blur(4px);
}
#sheet-backdrop.open { display: block; }
#sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink2); border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  z-index: 401; transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,1,.6,1);
  max-height: 90svh; overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}
#sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border); margin: 12px auto 0;
}
.sheet-body { padding: 20px 20px 16px; }
.sheet-title { font-size: 18px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 20px; }

/* Detail view inside sheet */
.detail-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; margin: 0 auto 16px;
}
.detail-name  { text-align: center; font-size: 20px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 4px; }
.detail-email { text-align: center; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); margin-bottom: 20px; }
.detail-row   { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid var(--border); font-size: 13px; }
.detail-label { color: var(--text2); }
.detail-val   { font-weight: 500; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); }
.detail-actions { display: flex; gap: 8px; margin-top: 20px; }

/* Form fields */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--text2); margin-bottom: 7px; }
.field input {
  width: 100%; background: var(--ink3); border: 1px solid var(--border);
  border-radius: var(--r2); color: var(--text); font-family: 'Syne', sans-serif;
  font-size: 15px; padding: 13px 14px; outline: none; transition: border-color .2s;
}
.field input:focus { border-color: var(--accent); background: var(--ink2); }
.field input:disabled { opacity: .4; cursor: not-allowed; }
.form-actions { display: flex; gap: 8px; margin-top: 20px; }

/* ── Buttons ─────────────────────────────────────────────────────────── */
.btn {
  border: none; border-radius: var(--r2); cursor: pointer;
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
  padding: 13px 18px; transition: all .15s;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  flex: 1;
}
.btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }
.btn:active:not(:disabled) { transform: scale(.97); }
.btn-primary { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; }
.btn-ghost   { background: var(--ink3); color: var(--text2); border: 1px solid var(--border); flex: 0 0 auto; padding: 13px 16px; }
.btn-danger  { background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
.btn-danger:active { background: rgba(248,113,113,.2); }
.btn.busy    { background: var(--ink3); color: var(--text2); }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }

/* ── Save overlay ────────────────────────────────────────────────────── */
#ov {
  position: fixed; inset: 0; background: rgba(8,10,18,.75);
  backdrop-filter: blur(6px); z-index: 900;
  display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
#ov.show { display: flex; animation: fadeUp .15s ease; }
.ov-card {
  background: var(--ink2); border: 1px solid var(--border);
  border-radius: 18px; padding: 32px 40px;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  min-width: 260px;
}
.ov-ring { width: 44px; height: 44px; border: 3px solid rgba(91,141,246,.15); border-top-color: var(--accent); border-radius: 50%; animation: spin .85s linear infinite; }
.ov-title { font-size: 15px; font-weight: 600; color: var(--text); }
.ov-steps { width: 100%; display: flex; flex-direction: column; gap: 6px; }
.ov-step  { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; transition: all .3s; }
.ov-step .sd { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.ov-step.on   { color: var(--accent);  background: rgba(91,141,246,.08); }
.ov-step.on .sd { animation: pulse .9s infinite; }
.ov-step.done { color: var(--green); background: rgba(52,211,153,.06); }

/* ── Toast ───────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink2); border: 1px solid var(--border);
  border-radius: 99px; padding: 10px 20px;
  font-size: 13px; font-weight: 500; white-space: nowrap;
  z-index: 999; opacity: 0; transition: all .25s; pointer-events: none;
  display: flex; align-items: center; gap: 8px;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { border-color: rgba(52,211,153,.4); }
#toast.bad { border-color: rgba(248,113,113,.4); }

/* ── Avatar colors ───────────────────────────────────────────────────── */
.av0 { background: rgba(91,141,246,.15);  color: #5b8df6; }
.av1 { background: rgba(139,108,247,.15); color: #8b6cf7; }
.av2 { background: rgba(52,211,153,.15);  color: #34d399; }
.av3 { background: rgba(251,191,36,.15);  color: #fbbf24; }
.av4 { background: rgba(248,113,113,.15); color: #f87171; }
.av5 { background: rgba(96,165,250,.15);  color: #60a5fa; }
</style>
</head>
<body>

<!-- Top progress bar -->
<div id="prog"></div>

<!-- Boot screen -->
<div id="boot">
  <div class="boot-logo">Employee Directory</div>
  <div class="boot-ring"></div>
  <div class="boot-msg" id="boot-msg">Loading SQLite engine...</div>
</div>

<!-- Save overlay -->
<div id="ov">
  <div class="ov-card">
    <div class="ov-ring"></div>
    <div class="ov-title" id="ov-title">Saving...</div>
    <div class="ov-steps">
      <div class="ov-step" id="os1"><div class="sd"></div>Downloading DB from Nextcloud</div>
      <div class="ov-step" id="os2"><div class="sd"></div>Writing your changes</div>
      <div class="ov-step" id="os3"><div class="sd"></div>Uploading updated DB</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- App -->
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div class="tb-left">
      <div class="tb-dot"></div>
      <div class="tb-title">Employees</div>
    </div>
    <div id="sync-badge">ready</div>
  </div>

  <!-- List view -->
  <div class="view active" id="view-list">
    <div class="search-section">
      <div class="search-wrap">
        <svg class="search-ico" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5">
          <circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="15" y2="15"/>
        </svg>
        <input type="text" id="search-inp" placeholder="Search name or email…" oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="stats-strip" id="stats-strip">
      <div class="stat-pill">Total<span id="stat-total">—</span></div>
    </div>
    <div class="emp-list" id="emp-list">
      <!-- shimmer -->
      <div class="shim-card"><div class="shim shim-circle"></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div class="shim" style="height:13px;width:55%"></div><div class="shim" style="height:11px;width:75%"></div></div></div>
      <div class="shim-card"><div class="shim shim-circle"></div><div style="flex:1;display:flex;flex-direction:column;gap:6px"><div class="shim" style="height:13px;width:45%"></div><div class="shim" style="height:11px;width:65%"></div></div></div>
    </div>
  </div>

</div>

<!-- FAB -->
<button id="fab" onclick="openAddSheet()" title="Add employee">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- Bottom sheet -->
<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script>
// ── Config ───────────────────────────────────────────────────────────────────
const NC_HOST  = 'nestle.thegood.cloud';
const NC_TOKEN = 'A56HnoCmP3FXj49';
const NC_PASS  = 'have@gooday112233';
const DB_FILE  = 'Employees.db';
const WEBDAV   = `https://${NC_HOST}/public.php/webdav/${DB_FILE}`;
const AUTH     = 'Basic ' + btoa(`${NC_TOKEN}:${NC_PASS}`);

// ── State ────────────────────────────────────────────────────────────────────
let SQL = null;
let db  = null;
let allRows = [];
let busy = false;
let searchTimer = null;
let stepTimer = null;
let currentEdit = null;

// ── Boot: load sql.js engine then fetch DB ────────────────────────────────────
(async () => {
  try {
    setBootMsg('Loading SQLite engine...');
    SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
    setBootMsg('Connecting to Nextcloud...');
    await fetchDB();
    setBootMsg('Ready!');
    await sleep(300);
    document.getElementById('boot').classList.add('hidden');
    document.getElementById('app').classList.add('show');
    renderList(allRows);
    setSyncBadge('ok', 'Connected');
  } catch(e) {
    setBootMsg('Error: ' + e.message);
  }
})();

// ── Nextcloud helpers ────────────────────────────────────────────────────────
async function fetchDB() {
  const res = await fetch(WEBDAV, { headers: { 'Authorization': AUTH, 'OCS-APIREQUEST': 'true' } });
  if (!res.ok) throw new Error(`Nextcloud: HTTP ${res.status}`);
  const buf = await res.arrayBuffer();
  if (db) db.close();
  db = new SQL.Database(new Uint8Array(buf));
  allRows = queryAll('SELECT * FROM employees ORDER BY ID');
  document.getElementById('stat-total').textContent = allRows.length;
  return allRows;
}

async function pushDB() {
  const data = db.export();
  const res  = await fetch(WEBDAV, {
    method: 'PUT',
    headers: { 'Authorization': AUTH, 'OCS-APIREQUEST': 'true', 'Content-Type': 'application/octet-stream' },
    body: data
  });
  if (!res.ok) throw new Error(`Upload failed: HTTP ${res.status}`);
}

// ── SQLite helpers ───────────────────────────────────────────────────────────
function queryAll(sql, params = []) {
  const stmt = db.prepare(sql);
  stmt.bind(params);
  const rows = [];
  while (stmt.step()) rows.push(stmt.getAsObject());
  stmt.free();
  return rows;
}

function runWrite(sql, params = []) {
  db.run(sql, params);
}

// ── Render list ──────────────────────────────────────────────────────────────
const COLORS = ['av0','av1','av2','av3','av4','av5'];

function initials(name) {
  return (name || '?').split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}
function avColor(id) { return COLORS[id % COLORS.length]; }

function renderList(rows) {
  const el = document.getElementById('emp-list');
  if (!rows.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><strong>No employees found</strong>Try a different search</div>`;
    return;
  }
  el.innerHTML = rows.map((r,i) => `
    <div class="emp-card" onclick="openDetail(${r.ID})" style="animation-delay:${i*30}ms">
      <div class="emp-avatar ${avColor(r.ID)}">${initials(r.Emp_Name)}</div>
      <div class="emp-info">
        <div class="emp-name">${escHtml(r.Emp_Name)}</div>
        <div class="emp-email">${escHtml(r.email)}</div>
        <div class="emp-id">#${r.ID}</div>
      </div>
      <svg class="emp-chev" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="6 4 10 8 6 12"/>
      </svg>
    </div>`).join('');
}

// ── Search ───────────────────────────────────────────────────────────────────
function onSearch(val) {
  clearTimeout(searchTimer);
  document.getElementById('search-clear').classList.toggle('show', val.length > 0);
  searchTimer = setTimeout(() => {
    const q = val.trim().toLowerCase();
    const filtered = q
      ? allRows.filter(r =>
          r.Emp_Name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q))
      : allRows;
    renderList(filtered);
  }, 250);
}

function clearSearch() {
  const inp = document.getElementById('search-inp');
  inp.value = '';
  document.getElementById('search-clear').classList.remove('show');
  renderList(allRows);
  inp.focus();
}

// ── Detail sheet ──────────────────────────────────────────────────────────────
function openDetail(id) {
  const r = allRows.find(r => r.ID === id);
  if (!r) return;
  currentEdit = r;
  document.getElementById('sheet-body').innerHTML = `
    <div class="emp-avatar ${avColor(r.ID)} detail-avatar">${initials(r.Emp_Name)}</div>
    <div class="detail-name">${escHtml(r.Emp_Name)}</div>
    <div class="detail-email">${escHtml(r.email)}</div>
    <div class="detail-row"><span class="detail-label">ID</span><span class="detail-val">#${r.ID}</span></div>
    <div class="detail-actions">
      <button class="btn btn-primary" onclick="openEditSheet(${r.ID})">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.8"><path d="M11 2l3 3-9 9H2v-3l9-9z"/></svg>
        Edit
      </button>
      <button class="btn btn-danger" onclick="deleteEmp(${r.ID})">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="2 4 14 4"/><path d="M5 4V2h6v2"/><path d="M3 4l1 10h8l1-10"/></svg>
        Delete
      </button>
    </div>`;
  openSheet();
}

// ── Add sheet ─────────────────────────────────────────────────────────────────
function openAddSheet() {
  currentEdit = null;
  document.getElementById('sheet-body').innerHTML = `
    <div class="sheet-title">Add Employee</div>
    <div class="field"><label>Full Name</label><input type="text" id="f-name" placeholder="e.g. Mohanad Aouad" autocomplete="off"></div>
    <div class="field"><label>Email Address</label><input type="email" id="f-email" placeholder="e.g. name@company.com" autocomplete="off"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveAdd()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2"><polyline points="2 8 6 12 14 4"/></svg>
        Save
      </button>
    </div>`;
  openSheet();
  setTimeout(() => document.getElementById('f-name')?.focus(), 350);
}

// ── Edit sheet ────────────────────────────────────────────────────────────────
function openEditSheet(id) {
  const r = allRows.find(r => r.ID === id);
  if (!r) return;
  currentEdit = r;
  document.getElementById('sheet-body').innerHTML = `
    <div class="sheet-title">Edit Employee</div>
    <div class="field"><label>Full Name</label><input type="text" id="f-name" value="${escAttr(r.Emp_Name)}" autocomplete="off"></div>
    <div class="field"><label>Email Address</label><input type="email" id="f-email" value="${escAttr(r.email)}" autocomplete="off"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveEdit(${r.ID})">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2"><polyline points="2 8 6 12 14 4"/></svg>
        Save Changes
      </button>
    </div>`;
  openSheet();
  setTimeout(() => document.getElementById('f-name')?.focus(), 350);
}

// ── Save add ──────────────────────────────────────────────────────────────────
async function saveAdd() {
  if (busy) return;
  const name  = document.getElementById('f-name')?.value.trim();
  const email = document.getElementById('f-email')?.value.trim();
  if (!name || !email) { toast('Please fill in both fields', false); return; }

  await syncOp('Adding employee...', async () => {
    await fetchDB();
    runWrite('INSERT INTO employees (Emp_Name, email) VALUES (?, ?)', [name, email]);
    await pushDB();
    allRows = queryAll('SELECT * FROM employees ORDER BY ID');
    document.getElementById('stat-total').textContent = allRows.length;
  });

  closeSheet();
  renderList(allRows);
  clearSearch();
  toast('Employee added!', true);
}

// ── Save edit ─────────────────────────────────────────────────────────────────
async function saveEdit(id) {
  if (busy) return;
  const name  = document.getElementById('f-name')?.value.trim();
  const email = document.getElementById('f-email')?.value.trim();
  if (!name || !email) { toast('Please fill in both fields', false); return; }

  await syncOp('Updating employee...', async () => {
    await fetchDB();
    runWrite('UPDATE employees SET Emp_Name = ?, email = ? WHERE ID = ?', [name, email, id]);
    await pushDB();
    allRows = queryAll('SELECT * FROM employees ORDER BY ID');
  });

  closeSheet();
  renderList(allRows);
  clearSearch();
  toast('Employee updated!', true);
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteEmp(id) {
  if (busy) return;
  if (!confirm('Delete this employee? This cannot be undone.')) return;

  await syncOp('Deleting employee...', async () => {
    await fetchDB();
    runWrite('DELETE FROM employees WHERE ID = ?', [id]);
    await pushDB();
    allRows = queryAll('SELECT * FROM employees ORDER BY ID');
    document.getElementById('stat-total').textContent = allRows.length;
  });

  closeSheet();
  renderList(allRows);
  clearSearch();
  toast('Employee deleted', true);
}

// ── Sync op wrapper ───────────────────────────────────────────────────────────
async function syncOp(title, fn) {
  busy = true;
  showOv(title);
  setSyncBadge('busy', 'Syncing...');
  progStart();
  try {
    await fn();
    setSyncBadge('ok', 'Saved');
  } catch(e) {
    setSyncBadge('err', 'Error');
    toast('Error: ' + e.message, false);
  } finally {
    busy = false;
    hideOv();
    progDone();
    setTimeout(() => setSyncBadge('ok', 'Connected'), 2000);
  }
}

// ── Overlay ───────────────────────────────────────────────────────────────────
function showOv(title) {
  document.getElementById('ov-title').textContent = title;
  ['os1','os2','os3'].forEach(id => document.getElementById(id).className = 'ov-step');
  document.getElementById('ov').classList.add('show');
  animStep(1);
}
function animStep(n) {
  clearTimeout(stepTimer);
  ['os1','os2','os3'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.className = 'ov-step' + (i+1 < n ? ' done' : i+1 === n ? ' on' : '');
  });
  if (n < 3) stepTimer = setTimeout(() => animStep(n+1), 1600);
}
function hideOv() {
  clearTimeout(stepTimer);
  ['os1','os2','os3'].forEach(id => document.getElementById(id).className = 'ov-step done');
  setTimeout(() => document.getElementById('ov').classList.remove('show'), 250);
}

// ── Progress bar ──────────────────────────────────────────────────────────────
function progStart() {
  const b = document.getElementById('prog');
  b.className = ''; b.style.width = '0%';
  requestAnimationFrame(() => b.classList.add('go'));
}
function progDone() {
  const b = document.getElementById('prog');
  b.classList.remove('go'); b.classList.add('done');
  setTimeout(() => { b.classList.remove('done'); b.style.width = '0%'; }, 500);
}

// ── Sync badge ────────────────────────────────────────────────────────────────
function setSyncBadge(cls, text) {
  const el = document.getElementById('sync-badge');
  el.className = cls;
  el.innerHTML = cls === 'busy'
    ? `<span class="badge-spin"></span>${text}`
    : text;
}

// ── Sheet ─────────────────────────────────────────────────────────────────────
function openSheet() {
  document.getElementById('sheet-backdrop').classList.add('open');
  requestAnimationFrame(() => document.getElementById('sheet').classList.add('open'));
}
function closeSheet() {
  if (busy) return;
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-backdrop').classList.remove('open');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.innerHTML = `<span style="color:${ok?'var(--green)':'var(--red)'}">${ok?'✓':'✕'}</span> ${msg}`;
  el.className = 'show ' + (ok ? 'ok' : 'bad');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function setBootMsg(msg) { document.getElementById('boot-msg').textContent = msg; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function sleep(ms)  { return new Promise(r => setTimeout(r, ms)); }
</script>
